; Kopie nach config.ini (neben der EXE bzw. im Projekt-Root) und Pfade anpassen.
; config.ini ist git-ignoriert (maschinenspezifisch).
[paths]
# Outpost-2-Installation (Ordner mit maps.vol bzw. OPU/-Unterordner)
# Windows:  game_path = D:\Outpost 2
# Linux:    game_path = /home/<user>/.wine/drive_c/Games/Outpost 2
game_path = D:\Outpost 2

# Visual-Studio-Installation (Ordner mit Common7\Tools\VsDevCmd.bat)
# Nur unter Windows relevant; unter Linux wird dieser Wert ignoriert.
# Only relevant on Windows; ignored on Linux.
msvs_path = C:\Program Files\Microsoft Visual Studio\18\Community

[build]
# Nur noetig, wenn das v142-Toolset (VS2019) fehlt:
# v143 = VS2022, v145 = VS2026. Leer lassen = Projekt-Vorgabe (v142).
# Only relevant on Windows (MSVC). Leave empty on Linux.
platform_toolset =
windows_sdk =

[output]
# Zielordner der Mission-DLL (leer = game_path/OPU wenn vorhanden, sonst game_path)
# Linux-Beispiel: /home/<user>/.wine/drive_c/Games/Outpost 2/OPU
output_dir =
# Dateiname der Mission-DLL (Colony-Missionen brauchen den Praefix "c")
dll_name = cEditorMission.dll

[ui]
# Sprache der Oberflaeche: auto (Systemsprache erkennen), de, en (lang.<code>.ini)
language = auto
# Kachelgitter ueber der Karte anzeigen (true/false)
show_grid = false
