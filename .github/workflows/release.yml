name: Build & Release

on:
  push:
    tags:
      - "v*"          # startet bei jedem Tag wie v0.2.0, v1.0.0 usw.

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install PySide6 numpy Pillow pyinstaller

      - name: EXE bauen
        run: python -m PyInstaller op2editor.spec

      - name: Zip erstellen
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\OP2MissionEditor\*" `
                           -DestinationPath "dist\OP2MissionEditor_$tag.zip"
        shell: pwsh

      - name: GitHub Release erstellen & ZIP hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OP2 Mission Editor ${{ github.ref_name }}"
          body: |
            ## OP2 Mission Editor ${{ github.ref_name }}

            ### Installation (Windows)
            1. ZIP entpacken
            2. `OP2MissionEditor.exe` starten
            3. In der erzeugten `config.ini` den `game_path` auf dein Outpost 2 Verzeichnis setzen

            ### Voraussetzungen
            - Windows 10/11 (64-bit)
            - Visual Studio Build Tools mit C++ (für den Missions-Build; der
              klassische OP2-SDK-Unterbau braucht MSVC)
            - Outpost 2 (OPU 1.4.1 empfohlen)

            Alle Neuerungen stehen im [CHANGELOG](https://github.com/fefi-byte/op2-codegen-editor/blob/main/CHANGELOG.md).
          files: dist/OP2MissionEditor_${{ github.ref_name }}.zip
          draft: false
          prerelease: false

  # Der frühere build-linux-Job entfällt: der OP2MissionSDK-Unterbau ist
  # MSVC-only, Missions-Builds unter Linux werden nicht mehr unterstützt.
  # The former build-linux job is gone: the OP2MissionSDK backend is
  # MSVC-only; mission builds on Linux are no longer supported.
