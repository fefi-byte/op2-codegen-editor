name: Build & Release

on:
  push:
    tags:
      - "v*"          # startet bei jedem Tag wie v0.2.0, v1.0.0 usw.

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install PySide6 numpy Pillow pyinstaller

      - name: EXE bauen
        run: python -m PyInstaller op2editor.spec

      - name: Zip erstellen
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\OP2MissionEditor\*" `
                           -DestinationPath "dist\OP2MissionEditor_$tag.zip"
        shell: pwsh

      - name: GitHub Release erstellen & ZIP hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OP2 Mission Editor ${{ github.ref_name }}"
          body: |
            ## OP2 Mission Editor ${{ github.ref_name }}

            ### Installation (Windows)
            1. ZIP entpacken
            2. `OP2MissionEditor.exe` starten
            3. In der erzeugten `config.ini` den `game_path` auf dein Outpost 2 Verzeichnis setzen

            ### Installation (Linux)
            ```
            sudo apt install python3 python3-venv cmake mingw-w64
            python3 -m venv .venv && source .venv/bin/activate
            pip install -r requirements.txt
            cd editor && python -m app
            ```
            `game_path` in `config.ini` auf den Wine-Pfad zeigen lassen, z.B.
            `~/.wine/drive_c/Games/Outpost 2`

            ### Voraussetzungen
            - Windows 10/11 (64-bit) **oder** Linux mit Wine
            - Windows: Visual Studio Build Tools (für den DLL-Compile-Schritt)
            - Linux: mingw-w64 + cmake (für den DLL-Compile-Schritt)
            - Outpost 2 (OPU 1.4.1 empfohlen)
          files: dist/OP2MissionEditor_${{ github.ref_name }}.zip
          draft: false
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System-Pakete installieren
        run: sudo apt-get install -y mingw-w64 cmake

      - name: Python-Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Smoke-Test (Editor importierbar)
        run: |
          cd editor
          python -c "
          import sys
          sys.argv = ['app']
          # Nur Imports prüfen, keine GUI starten
          import importlib, types
          # Stub Qt-App damit kein Display nötig ist
          from unittest.mock import patch, MagicMock
          with patch('PySide6.QtWidgets.QApplication', MagicMock):
              pass
          from app import mission_project, i18n
          from codegen import build
          print('OK: alle Module importierbar')
          "

      - name: MinGW-Toolchain prüfen
        run: |
          which i686-w64-mingw32-gcc
          which i686-w64-mingw32-g++
          which i686-w64-mingw32-windres
          which cmake
          echo "OK: MinGW-Toolchain gefunden"
